description: >
  Enhanced plugin for Jellyfin that fetches anime themes (OPs and EDs) from animethemes.moe.
  Supports multiple ID providers (AniDB, MyAnimeList, AniList, Kitsu, AniSearch) with
  configurable priority order, title-based fallback search, and persistent caching.

