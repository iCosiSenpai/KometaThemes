changelog: |-
  v1.0.7.1
  - Increase secondary-text contrast and make accessibility audits deterministic across CI rendering speeds

  v1.0.7.0
  - Shared versioned asset loader with visible failure handling across all Jellyfin page shells
  - Shared accessibility module for keyboard tabs, busy states and live announcements
  - Playwright end-to-end coverage and automated axe WCAG A/AA audits in CI
  - Complete language-specific English and Italian documentation with official support and repository buttons

  v1.0.0.7
  - Interface language (English / Italiano, in the General tab) now switches the whole dashboard instantly when you pick it, instead of only after saving and reopening the page

  v1.0.0.6
  - Unresolved tab: each row now has a "Search & bind" button that opens the Theme Finder for that anime so you can search and attach themes manually
  - Clearer settings: the old "Library" tab is now "Excluded" (just the blacklist, with plainer wording) and the themes playlist moved into the "Themes & Download" tab with a short explanation of what Refresh / Export M3U do

  v1.0.0.5
  - Theme Finder: selections now persist when you switch between results, so you can pick OP/ED/video across different seasons (which appear as separate animethemes.moe entries) and download them all to one item
  - New selection review panel listing every picked theme grouped by anime, each removable; each search result shows a badge with how many themes you picked from it
  - After a partial download, only the failed items stay selected (ready to retry) instead of clearing everything

  v1.0.0.4
  - Donate buttons now use the official Buy Me a Coffee and PayPal Donate buttons

  v1.0.0.3
  - Added Buy Me a Coffee and PayPal donate buttons to the plugin pages, README and the GitHub Sponsor button

  v1.0.0.2
  - Fix: the provider priority list no longer grows with duplicate entries on every save/restart (the saved list is now deduplicated and repaired automatically on load)
  - The "KometaThemes" entry in the dashboard Plugins sidebar now shows the brand planet icon instead of the generic folder, and a cleaner "KometaThemes" label

  v1.0.0.1
  - Fix: the ♪ Theme Finder button is now injected correctly when other web-mod plugins (Jellyfin Enhanced, KefinTweaks, JavaScript Injector, …) are installed — the File Transformation registration now joins the shared "index.html" pipeline instead of a separate one that never ran

  v1.0.0.0
  - Automatic anime OP/ED theme download from animethemes.moe (audio + video)
  - Multi-provider matching (AniDB, AniList, MyAnimeList, Kitsu, AniSearch) with title fallback
  - Multi-season detection and AllPerSeason fetch
  - Theme Finder: guided search with audio/video preview, reachable from a ♪ button on item pages (auto-injected via the File Transformation plugin)
  - Unresolved tab: items that failed to match or download, with per-item Retry and Blacklist
  - Activity log showing the plugin's Jellyfin server-log entries; live sync indicator
  - One-click theme link repair for the Jellyfin 10.11.x playback bug
  - Persistent resolution cache, rate limiting, parallel downloads, global M3U playlist, EN/IT UI
