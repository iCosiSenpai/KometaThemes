<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>KometaThemes — Theme Finder</title>
</head>
<body>
    <div id="KometaThemesSearchPage" data-role="page" class="page type-interior pluginConfigurationPage kt-page"
         data-require="emby-input,emby-button,emby-select,emby-checkbox">
        <div data-role="content">
            <div class="content-primary">
                <div class="kt-shell" id="ktSearchShell">

                    <!-- hero: item context + stepper -->
                    <div class="kt-hero kt-reveal">
                        <div class="kt-hero-backdrop" id="ktFinderBackdrop" style="display:none;"></div>
                        <div class="kt-hero-scrim"></div>
                        <div class="kt-hero-content">
                            <div class="kt-row" style="justify-content:space-between;">
                                <div class="kt-brand">
                                    <svg class="kt-comet" width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <!-- Tail -->
  <path d="M22 10 Q30 8 31 18" stroke-width="4.5" stroke-linecap="round" fill="none" opacity="0.65"/>
  <!-- Nucleus -->
  <circle cx="13" cy="20" r="7.5"/>
  <!-- Highlight -->
  <circle cx="11" cy="18" r="2.2" fill="#ffffff" opacity="0.75"/>
</svg>
                                    <div class="kt-wordmark"><strong>Kometa</strong><span data-kt="finderKicker"></span></div>
                                </div>
                                <span class="kt-row" style="gap:8px;"><span class="kt-live-dot is-idle" id="ktLiveDot"></span><span class="kt-version">v1.0.7.0</span></span>
                            </div>
                            <div class="kt-row" style="gap:16px; align-items:flex-start;">
                                <div class="kt-poster" id="ktFinderPoster" style="width:84px;"><div class="kt-poster-ph">♪</div></div>
                                <div class="kt-stack kt-grow" style="gap:6px;">
                                    <p class="kt-kicker" data-kt="finderTarget"></p>
                                    <h2 class="kt-title" id="ktFinderTitle"><span class="kt-skel" style="display:inline-block;width:240px;max-width:100%;height:20px;"></span></h2>
                                    <div class="kt-row" id="ktFinderChips" style="gap:6px;"></div>
                                </div>
                            </div>
                            <div class="kt-paths" id="ktFinderPaths"></div>
                            <div class="kt-stepper" id="ktStepper">
                                <div class="kt-step" data-step="1"><span class="kt-step-dot">1</span><span data-kt="step1"></span></div>
                                <div class="kt-step-line"></div>
                                <div class="kt-step" data-step="2"><span class="kt-step-dot">2</span><span data-kt="step2"></span></div>
                                <div class="kt-step-line"></div>
                                <div class="kt-step" data-step="3"><span class="kt-step-dot">3</span><span data-kt="step3"></span></div>
                            </div>
                        </div>
                    </div>

                    <div id="ktFinderNoItem" class="kt-empty" style="display:none;">
                        <svg class="kt-comet" width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <!-- Tail -->
  <path d="M22 10 Q30 8 31 18" stroke-width="4.5" stroke-linecap="round" fill="none" opacity="0.65"/>
  <!-- Nucleus -->
  <circle cx="13" cy="20" r="7.5"/>
  <!-- Highlight -->
  <circle cx="11" cy="18" r="2.2" fill="#ffffff" opacity="0.75"/>
</svg>
                        <h3 class="kt-subtitle" data-kt="noItemTitle"></h3>
                        <p class="kt-note" data-kt="finderNoItemBody"></p>
                    </div>

                    <div class="kt-workspace" id="ktFinderWorkspace">
                        <!-- left: search + results -->
                        <div class="kt-stack">
                            <div class="kt-card kt-reveal">
                                <div class="kt-stack">
                                    <h3 class="kt-subtitle" data-kt="searchTitle"></h3>
                                    <div class="kt-field">
                                        <label for="ktSearchInput" data-kt="searchLabel"></label>
                                        <input id="ktSearchInput" class="kt-input" type="text" />
                                    </div>
                                    <div class="kt-row">
                                        <div class="kt-field" style="width:110px;max-width:100%;">
                                            <label for="ktSearchYear" data-kt="searchYear"></label>
                                            <input id="ktSearchYear" class="kt-input" type="number" min="1950" max="2100" />
                                        </div>
                                        <button type="button" class="kt-btn kt-btn-primary kt-grow" id="ktBtnSearch" style="align-self:end;"></button>
                                    </div>
                                    <div class="kt-state" id="ktSearchState" role="status" aria-live="polite"></div>
                                </div>
                            </div>
                            <div class="kt-card kt-card-flush kt-reveal" id="ktResultsCard" style="display:none;">
                                <div class="kt-card-head">
                                    <h3 class="kt-subtitle" data-kt="resultsTitle"></h3>
                                    <span class="kt-chip" id="ktResultsCount"></span>
                                </div>
                                <div class="kt-card-body">
                                    <div class="kt-results" id="ktResults"></div>
                                    <details id="ktBroadWrap" style="display:none;">
                                        <summary class="kt-note" style="cursor:pointer;" data-kt="broadResults"></summary>
                                        <div class="kt-results" id="ktBroadResults" style="margin-top:10px;"></div>
                                    </details>
                                </div>
                            </div>
                        </div>

                        <!-- right: selected anime + themes -->
                        <div class="kt-stack" id="ktDetailColumn">
                            <div class="kt-empty" id="ktDetailEmpty">
                                <svg class="kt-comet" width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <!-- Tail -->
  <path d="M22 10 Q30 8 31 18" stroke-width="4.5" stroke-linecap="round" fill="none" opacity="0.65"/>
  <!-- Nucleus -->
  <circle cx="13" cy="20" r="7.5"/>
  <!-- Highlight -->
  <circle cx="11" cy="18" r="2.2" fill="#ffffff" opacity="0.75"/>
</svg>
                                <p class="kt-note" data-kt="detailEmpty"></p>
                            </div>
                            <div class="kt-card kt-reveal" id="ktAnimeCard" style="display:none;">
                                <div class="kt-row" style="gap:16px; align-items:flex-start;">
                                    <div class="kt-poster" id="ktAnimePoster" style="width:96px;"><div class="kt-poster-ph">?</div></div>
                                    <div class="kt-stack kt-grow" style="gap:6px;">
                                        <h3 class="kt-title" id="ktAnimeTitle" style="font-size:1.25em;"></h3>
                                        <div class="kt-row" id="ktAnimeChips" style="gap:6px;"></div>
                                        <p class="kt-note" id="ktAnimeSynopsis" style="display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;"></p>
                                    </div>
                                </div>
                            </div>
                            <div class="kt-stack" id="ktSeasonGroups"></div>
                        </div>
                    </div>

                    <!-- selection review panel (selections persist across results) -->
                    <details class="kt-sel-review" id="ktSelReview" style="display:none;">
                        <summary><span id="ktSelReviewTitle"></span></summary>
                        <div class="kt-sel-review-body" id="ktSelReviewBody"></div>
                    </details>

                    <!-- sticky selection / download bar -->
                    <div class="kt-stickybar" id="ktSelBar" style="display:none;">
                        <span class="kt-state" id="ktSelCount"></span>
                        <button type="button" class="kt-btn kt-btn-sm kt-btn-ghost" data-bulk="op-audio"></button>
                        <button type="button" class="kt-btn kt-btn-sm kt-btn-ghost" data-bulk="ed-audio"></button>
                        <button type="button" class="kt-btn kt-btn-sm kt-btn-ghost" data-bulk="video"></button>
                        <button type="button" class="kt-btn kt-btn-sm kt-btn-ghost" data-bulk="clear"></button>
                        <button type="button" class="kt-btn kt-btn-ghost" id="ktBtnSaveBinding"></button>
                        <button type="button" class="kt-btn kt-btn-primary" id="ktBtnDownload"></button>
                    </div>
                    <div class="kt-log" id="ktDownloadLog" role="log" aria-live="polite" style="display:none;"></div>

                    <!-- support / donate -->
                    <div class="kt-support">
                        <span class="kt-support-label" data-kt="supportLabel"></span>
                        <a class="kt-support-link" href="https://buymeacoffee.com/iCosiSenpai" target="_blank" rel="noopener noreferrer" data-kt="supportCoffee"></a>
                        <a class="kt-support-link" href="https://www.paypal.com/donate/?hosted_button_id=5A4E26XC45GLQ" target="_blank" rel="noopener noreferrer" data-kt="supportPayPal"></a>
                        <a class="kt-support-link" href="https://github.com/iCosiSenpai/KometaThemes" target="_blank" rel="noopener noreferrer" data-kt="supportGitHub"></a>
                    </div>

                </div>
            </div>
        </div>
        <script>
        (function () {
            var V = '1.0.7.0';
            var page = document.getElementById('KometaThemesSearchPage');

            function reportBootstrapFailure() {
                var host = page.querySelector('.kt-shell');
                if (!host || host.querySelector('[data-kt-bootstrap-error]')) { return; }
                var alert = document.createElement('div');
                alert.className = 'kt-state error';
                alert.setAttribute('role', 'alert');
                alert.setAttribute('data-kt-bootstrap-error', '');
                alert.textContent = 'KometaThemes could not load its page loader. Refresh the dashboard and try again.';
                host.insertBefore(alert, host.firstChild);
            }

            function loadPage() {
                if (!window.KTLoader || window.KTLoader.VERSION !== V) { reportBootstrapFailure(); return; }
                window.KTLoader.load(page, [
                    'KometaThemesCoreJs',
                    'KometaThemesA11yJs',
                    'KometaThemesSearchJs'
                ], function () { window.KT.pages.search.show(page); });
            }

            function start() {
                if (window.KTLoader && window.KTLoader.VERSION === V) { loadPage(); return; }
                var id = 'kt-js-KometaThemesLoaderJs-' + V;
                var existing = document.getElementById(id);
                if (existing) {
                    if (existing.dataset.loaded === '1') { loadPage(); }
                    else if (existing.dataset.failed === '1') { reportBootstrapFailure(); }
                    else {
                        existing.addEventListener('load', loadPage, { once: true });
                        existing.addEventListener('error', reportBootstrapFailure, { once: true });
                    }
                    return;
                }
                var script = document.createElement('script');
                script.id = id;
                script.src = 'configurationpage?name=KometaThemesLoaderJs&v=' + V;
                script.addEventListener('load', function () { script.dataset.loaded = '1'; loadPage(); }, { once: true });
                script.addEventListener('error', function () { script.dataset.failed = '1'; reportBootstrapFailure(); }, { once: true });
                document.head.appendChild(script);
            }

            page.addEventListener('pageshow', start);
        })();
        </script>
    </div>
</body>
</html>
