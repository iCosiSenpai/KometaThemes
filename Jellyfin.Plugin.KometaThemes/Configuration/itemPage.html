<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>KometaThemes</title>
</head>
<body>
    <div id="KometaThemesItemPage" data-role="page" class="page type-interior pluginConfigurationPage kt-page"
         data-require="emby-input,emby-button,emby-select,emby-checkbox">
        <div data-role="content">
            <div class="content-primary">
                <div class="kt-shell" id="ktItemShell">

                    <div class="kt-hero kt-reveal">
                        <div class="kt-hero-backdrop" id="ktItemBackdrop" style="display:none;"></div>
                        <div class="kt-hero-scrim"></div>
                        <div class="kt-hero-content">
                            <div class="kt-row" style="justify-content:space-between;">
                                <div class="kt-brand">
                                    <svg class="kt-comet" width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <!-- Tail -->
  <path d="M22 10 Q30 8 31 18" stroke-width="4.5" stroke-linecap="round" fill="none" opacity="0.65"/>
  <!-- Nucleus -->
  <circle cx="13" cy="20" r="7.5"/>
  <!-- Highlight -->
  <circle cx="11" cy="18" r="2.2" fill="#ffffff" opacity="0.75"/>
</svg>
                                    <div class="kt-wordmark"><strong>Kometa</strong><span>Themes</span></div>
                                </div>
                                <span class="kt-row" style="gap:8px;"><span class="kt-live-dot is-idle" id="ktLiveDot"></span><span class="kt-version">v1.0.7.0</span></span>
                            </div>
                            <div class="kt-row" style="gap:16px; align-items:flex-start;">
                                <div class="kt-poster" id="ktItemPoster" style="width:84px;">
                                    <div class="kt-poster-ph">♪</div>
                                </div>
                                <div class="kt-stack kt-grow" style="gap:6px;">
                                    <p class="kt-kicker" data-kt="itemThemes"></p>
                                    <h2 class="kt-title" id="ktItemTitle"><span class="kt-skel" style="display:inline-block;width:220px;max-width:100%;height:20px;"></span></h2>
                                    <div class="kt-row" id="ktItemChips" style="gap:6px;"></div>
                                    <div id="ktRegBanner"></div>
                                </div>
                            </div>
                            <div class="kt-row" id="ktItemActions">
                                <button type="button" class="kt-btn kt-btn-primary" id="ktBtnSyncItem"></button>
                                <button type="button" class="kt-btn" id="ktBtnFinder"></button>
                                <button type="button" class="kt-btn kt-btn-ghost" id="ktBtnRefresh"></button>
                                <button type="button" class="kt-btn kt-btn-danger" id="ktBtnDeleteAll"></button>
                            </div>
                            <div class="kt-state" id="ktItemState" role="status" aria-live="polite"></div>
                        </div>
                    </div>

                    <div id="ktNoItem" class="kt-empty" style="display:none;">
                        <svg class="kt-comet" width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <!-- Tail -->
  <path d="M22 10 Q30 8 31 18" stroke-width="4.5" stroke-linecap="round" fill="none" opacity="0.65"/>
  <!-- Nucleus -->
  <circle cx="13" cy="20" r="7.5"/>
  <!-- Highlight -->
  <circle cx="11" cy="18" r="2.2" fill="#ffffff" opacity="0.75"/>
</svg>
                        <h3 class="kt-subtitle" data-kt="noItemTitle"></h3>
                        <p class="kt-note" data-kt="noItemBody"></p>
                        <button type="button" class="kt-btn" id="ktBtnGoSettings"></button>
                    </div>

                    <div class="kt-card kt-card-flush kt-reveal" id="ktThemesCard">
                        <div class="kt-card-head">
                            <h3 class="kt-subtitle" data-kt="downloadedThemes"></h3>
                            <span class="kt-chip" id="ktThemesCount">-</span>
                        </div>
                        <div class="kt-themes" id="ktThemesList"></div>
                    </div>

                    <div class="kt-card kt-reveal" id="ktPresetsCard">
                        <div class="kt-stack">
                            <h3 class="kt-subtitle" data-kt="libraryPresets"></h3>
                            <p class="kt-note" data-kt="libraryPresetsNote"></p>
                            <div class="kt-row" id="ktPresetRow"></div>
                            <div class="kt-progress" id="ktSyncProgress" style="display:none;">
                                <div class="kt-progress-track"><div class="kt-progress-fill"></div></div>
                                <div class="kt-state" data-kt-sync-text role="status" aria-live="polite"></div>
                                <div class="kt-counters" data-kt-sync-counters></div>
                            </div>
                        </div>
                    </div>

                    <!-- support / donate -->
                    <div class="kt-support">
                        <span class="kt-support-label" data-kt="supportLabel"></span>
                        <a class="kt-support-link" href="https://buymeacoffee.com/iCosiSenpai" target="_blank" rel="noopener noreferrer" data-kt="supportCoffee"></a>
                        <a class="kt-support-link" href="https://www.paypal.com/donate/?hosted_button_id=5A4E26XC45GLQ" target="_blank" rel="noopener noreferrer" data-kt="supportPayPal"></a>
                        <a class="kt-support-link" href="https://github.com/iCosiSenpai/KometaThemes" target="_blank" rel="noopener noreferrer" data-kt="supportGitHub"></a>
                    </div>

                </div>
            </div>
        </div>
        <script>
        (function () {
            var V = '1.0.7.0';
            var page = document.getElementById('KometaThemesItemPage');

            function reportBootstrapFailure() {
                var host = page.querySelector('.kt-shell');
                if (!host || host.querySelector('[data-kt-bootstrap-error]')) { return; }
                var alert = document.createElement('div');
                alert.className = 'kt-state error';
                alert.setAttribute('role', 'alert');
                alert.setAttribute('data-kt-bootstrap-error', '');
                alert.textContent = 'KometaThemes could not load its page loader. Refresh the dashboard and try again.';
                host.insertBefore(alert, host.firstChild);
            }

            function loadPage() {
                if (!window.KTLoader || window.KTLoader.VERSION !== V) { reportBootstrapFailure(); return; }
                window.KTLoader.load(page, [
                    'KometaThemesCoreJs',
                    'KometaThemesA11yJs',
                    'KometaThemesItemJs'
                ], function () { window.KT.pages.item.show(page); });
            }

            function start() {
                if (window.KTLoader && window.KTLoader.VERSION === V) { loadPage(); return; }
                var id = 'kt-js-KometaThemesLoaderJs-' + V;
                var existing = document.getElementById(id);
                if (existing) {
                    if (existing.dataset.loaded === '1') { loadPage(); }
                    else if (existing.dataset.failed === '1') { reportBootstrapFailure(); }
                    else {
                        existing.addEventListener('load', loadPage, { once: true });
                        existing.addEventListener('error', reportBootstrapFailure, { once: true });
                    }
                    return;
                }
                var script = document.createElement('script');
                script.id = id;
                script.src = 'configurationpage?name=KometaThemesLoaderJs&v=' + V;
                script.addEventListener('load', function () { script.dataset.loaded = '1'; loadPage(); }, { once: true });
                script.addEventListener('error', function () { script.dataset.failed = '1'; reportBootstrapFailure(); }, { once: true });
                document.head.appendChild(script);
            }

            page.addEventListener('pageshow', start);
        })();
        </script>
    </div>
</body>
</html>
