name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.2
          cache: npm

      - name: Install browser test dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser and accessibility tests
        run: npm run test:browser

      - name: Upload browser test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'

      - name: Package plugin
        if: success()
        run: |
          mkdir -p artifacts
          zip -j artifacts/KometaThemes.zip Jellyfin.Plugin.KometaThemes/bin/Release/net9.0/Jellyfin.Plugin.KometaThemes.dll
          md5sum artifacts/KometaThemes.zip

      - name: Upload plugin artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: KometaThemes-plugin
          path: artifacts/KometaThemes.zip
